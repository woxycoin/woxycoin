name: Build Woxycoin

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libtool autotools-dev automake pkg-config bsdmainutils python3
          sudo apt-get install -y libssl-dev libevent-dev libboost-all-dev
          sudo apt-get install -y libdb-dev libdb++-dev libsqlite3-dev
          sudo apt-get install -y libminiupnpc-dev libzmq3-dev libfmt-dev
          sudo apt-get install -y qtbase5-dev qttools5-dev-tools qttools5-dev libqrencode-dev

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: ./configure --with-gui=qt5 --with-incompatible-bdb --disable-tests --disable-bench

      - name: Build
        run: make -j$(nproc)

      - name: Package
        run: |
          mkdir -p woxycoin-linux
          cp src/woxycoind woxycoin-linux/ || true
          cp src/woxycoin-cli woxycoin-linux/ || true
          cp src/woxycoin-tx woxycoin-linux/ || true
          cp src/qt/woxycoin-qt woxycoin-linux/ || true
          strip woxycoin-linux/* || true
          tar -czvf woxycoin-linux-x64.tar.gz woxycoin-linux/

      - name: Upload Linux Build
        uses: actions/upload-artifact@v4
        with:
          name: woxycoin-linux-x64
          path: woxycoin-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-autotools
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-db
            mingw-w64-x86_64-libevent
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-miniupnpc
            mingw-w64-x86_64-qrencode
            mingw-w64-x86_64-zeromq
            mingw-w64-x86_64-cppzmq
            zip

      - name: Autogen
        run: ./autogen.sh

      - name: Configure
        run: ./configure --host=x86_64-w64-mingw32 --prefix=/mingw64 --with-gui=qt5 --with-incompatible-bdb --disable-tests --disable-bench

      - name: Build
        run: make -j$(nproc)

      - name: Package
        run: |
          mkdir -p woxycoin-win64
          cp src/woxycoind.exe woxycoin-win64/
          cp src/woxycoin-cli.exe woxycoin-win64/
          cp src/woxycoin-tx.exe woxycoin-win64/
          cp src/qt/woxycoin-qt.exe woxycoin-win64/
          strip woxycoin-win64/*.exe
          zip -r woxycoin-win64.zip woxycoin-win64/

      - name: Upload Windows Build
        uses: actions/upload-artifact@v4
        with:
          name: woxycoin-win64
          path: woxycoin-win64.zip

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            woxycoin-linux-x64/*.tar.gz
            woxycoin-win64/*.zip
          body: |
            ## Woxycoin ${{ github.ref_name }}

            ### Downloads
            | Platform | File | Contents |
            |----------|------|----------|
            | Linux | woxycoin-linux-x64.tar.gz | woxycoind, woxycoin-cli, woxycoin-qt |
            | Windows | woxycoin-win64.zip | woxycoind.exe, woxycoin-cli.exe, woxycoin-qt.exe |

            ### Features
            - Dev Fee: 5% (400-100k), 2% (100k-1M), 1.5% (1M-2.2M)
            - Max Supply: 84,000,000 WOXY
            - Block Time: 1.5 minutes
            - Algorithm: Scrypt

            ### Seed Node
            - 13.60.61.151:9777
